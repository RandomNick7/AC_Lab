name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/cloud-app

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/


  docker-build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed image digest ${{ steps.docker_build.outputs.digest }}"


  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: docker-build-push  # Only runs after the image is successfully pushed
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      GKE_CLUSTER: ${{ secrets.GKE_CLUSTER_NAME }}
      GKE_ZONE: ${{ secrets.GKE_CLUSTER_ZONE }}
      GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticates the runner with GCP using a service account key
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Fetches the kubeconfig for the target GKE cluster so subsequent kubectl commands are automatically routed to the right cluster.
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}
          project_id: ${{ env.GCP_PROJECT }}

      # Stamp the exact image tag produced by Job 2 into the deployment manifest before applying it, making every deploy traceable to a specific commit
      - name: Substitute image tag in deployment manifest
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}"
          sed -i "s|IMAGE_PLACEHOLDER|${IMAGE}|g" k8s/deployment.yaml

      # Apply the namespace first so all subsequent resources have somewhere to land
      # `kubectl apply` is idempotent
      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      # Apply all remaining manifests
      # RollingUpdate strategy in the Deployment ensures zero downtime
      # To rollback, run: kubectl rollout undo deployment/cloud-app -n cloud-app
      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      # Wait until the rollout completes before marking the job as successful.
      # If the new pods fail readiness checks, this step fails and the pipeline surfaces the error & old pods continue serving traffic
      - name: Wait for rollout to complete
        run: kubectl rollout status deployment/cloud-app -n cloud-app --timeout=120s

      # ServiceMonitor depends on the CRD shipped by kube-prometheus-stack.
      # That chart is installed once manually (cluster setup), so this step is safe to run on every deploy
      - name: Apply monitoring manifests
        run: kubectl apply -f k8s/monitoring/
