apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cloud-app
  namespace: cloud-app
  labels:
    # This label must match the serviceMonitorSelector in the Prometheus CR
    # installed by kube-prometheus-stack (release: prometheus)
    release: prometheus
spec:
  selector:
    matchLabels:
      app: cloud-app
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
